name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Type-check and build
        run: npm run build
      - name: Upload extension build
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

name: Attach build to release

# Runs when a GitHub release is published. Builds the extension, packages the
# contents of dist/ into a zip, and attaches it to the release as an asset so
# it can be downloaded and uploaded manually to the Chrome Web Store and the
# Microsoft Edge Add-ons store.
#
# Store publishing is fully manual: this workflow only produces the packaged
# zip, it does NOT publish to any store. Remember to bump the version in
# package.json before creating the release.

on:
  release:
    types: [published]

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Type-check and build
        run: npm run build
      - name: Package dist
        run: cd dist && zip -r ../dragon-better-history-${{ github.event.release.tag_name }}.zip .
      - name: Attach zip to the release
        run: gh release upload "${{ github.event.release.tag_name }}" dragon-better-history-${{ github.event.release.tag_name }}.zip
        env:
          GH_TOKEN: ${{ github.token }}

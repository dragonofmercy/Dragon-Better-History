name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, edge]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Type-check and build
        run: npm run build:${{ matrix.browser }}
      - name: Package dist
        run: cd dist && zip -r ../dragon-better-history-${{ matrix.browser }}.zip .
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dragon-better-history-${{ matrix.browser }}
          path: dragon-better-history-${{ matrix.browser }}.zip

  publish-edge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dragon-better-history-edge
      - name: Publish to Microsoft Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: dragon-better-history-edge.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}

  upload-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dragon-better-history-chrome
          path: chrome
      - uses: actions/download-artifact@v7
        with:
          name: dragon-better-history-edge
          path: edge
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chrome/dragon-better-history-chrome.zip
            edge/dragon-better-history-edge.zip
